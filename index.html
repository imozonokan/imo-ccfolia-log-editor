<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ココフォリア・ログ整形エディター</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SortableJS CDN (ドラッグ＆ドロップ用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    .drag-handle {
      cursor: grab;
    }
    .drag-handle:active {
      cursor: grabbing;
    }
    .sortable-ghost {
      opacity: 0.4;
      background-color: #f3f4f6;
      border: 2px dashed #9ca3af;
    }
    /* パレット用カラースクエアのスタイル */
    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      transition: transform 0.1s ease;
    }
    .color-swatch:hover {
      transform: scale(1.15);
    }
  </style>
</head>
<!-- h-screen と overflow-hidden を指定して画面全体のスクロールを抑止 -->
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col overflow-hidden">

  <!-- ヘッダー -->
  <header class="bg-indigo-900 text-white p-4 shadow-md flex justify-between items-center shrink-0">
    <h1 class="text-xl font-bold">ココフォリア・ログ整形エディター</h1>
    <div class="flex items-center space-x-3">
      <label class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded cursor-pointer transition text-sm">
        ログファイルを読み込む
        <input type="file" id="fileInput" accept=".html" class="hidden" />
      </label>
      <button id="exportBtn" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-semibold transition hidden">
        HTMLログを出力して保存
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-1 flex overflow-hidden">
    <!-- サイドバー (コントロールパネル) -->
    <aside id="sidebar" class="w-80 bg-white border-r border-gray-200 p-4 flex flex-col justify-between overflow-y-auto hidden shrink-0">
      <div class="space-y-6">
        <!-- タブ表示切り替え -->
        <div>
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">タブ表示/出力切り替え</h2>
          <div id="tabFilters" class="space-y-2">
            <!-- 動的に生成 -->
          </div>
        </div>

        <!-- 一括処理 -->
        <div>
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">一括処理</h2>
          <button id="removeSlashBtn" class="w-full bg-amber-600 hover:bg-amber-500 text-white text-xs py-2 rounded font-semibold transition shadow-sm">
            文末の「/」を一括削除
          </button>
        </div>

        <!-- キャラクター一括操作 -->
        <div>
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">キャラクター一覧と操作</h2>
          <div id="charList" class="space-y-3 max-h-48 overflow-y-auto pr-1 border border-gray-100 p-2 rounded">
            <!-- 動的に生成 -->
          </div>
        </div>

        <!-- 新規発言追加 -->
        <div class="border-t border-gray-200 pt-4">
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">新規発言の追加</h2>
          <div class="space-y-2">
            <div>
              <label class="text-xs text-gray-500 font-semibold">発言者名</label>
              <input type="text" id="addName" class="w-full border rounded px-2 py-1 text-sm" placeholder="発言者名を入力" />
            </div>
            <div class="flex space-x-2">
              <div class="w-1/2">
                <label class="text-xs text-gray-500 font-semibold">タブ</label>
                <select id="addTab" class="w-full border rounded px-2 py-1 text-sm">
                  <option value="main">[main]</option>
                  <option value="sub">[sub]</option>
                  <option value="other">[other]</option>
                  <option value="info">[info]</option>
                  <option value="system">[system]</option>
                </select>
              </div>
              <div class="w-1/2">
                <label class="text-xs text-gray-500 font-semibold">色指定 (HEX)</label>
                <input type="text" id="addTextColor" class="w-full border rounded px-2 py-1 text-sm font-mono" value="#888888" placeholder="#888888" />
              </div>
            </div>
            <!-- 追加画面用カラーパレットグリッド -->
            <div>
              <label class="text-xs text-gray-500 font-semibold block mb-1">パレットから色を選ぶ</label>
              <div id="addPaletteGrid" class="grid grid-cols-8 gap-1 p-1 bg-gray-50 rounded border"></div>
            </div>
            <div>
              <label class="text-xs text-gray-500 font-semibold">本文 (改行可)</label>
              <textarea id="addContent" rows="3" class="w-full border rounded px-2 py-1 text-sm" placeholder="発言内容を入力"></textarea>
            </div>
            <button id="addLogBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-xs py-2 rounded font-semibold transition">
              末尾に発言を追加する
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- エディターメイン画面 -->
    <section class="flex-1 flex flex-col bg-gray-100 overflow-hidden">
      <!-- 案内表示 -->
      <div id="welcomeScreen" class="flex-1 flex flex-col justify-center items-center p-8 text-center">
        <svg class="w-16 h-16 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <p class="text-lg font-semibold text-gray-600">ココフォリアから出力したHTMLログを選択するか、ここにドラッグ＆ドロップしてください。</p>
        <p class="text-xs text-gray-400 mt-2">※HTMLデータは完全にローカルで安全にパースされ、外部送信されません。</p>
      </div>

      <!-- ログリスト -->
      <div id="editorContainer" class="flex-1 overflow-y-auto p-4 space-y-2 hidden">
        <div id="logList" class="space-y-2">
          <!-- ログ要素が動的に配置されます -->
        </div>
      </div>
    </section>
  </main>

  <!-- カラー変更用ダイアログモーダル -->
  <div id="colorModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-lg shadow-xl p-6 w-80">
      <h3 class="font-bold text-lg mb-2 text-gray-800">カラーの一括変更</h3>
      <p class="text-sm text-gray-500 mb-3">発言者: <span id="modalTargetChar" class="font-semibold text-indigo-600"></span></p>
      
      <!-- 安全なカラーパレットグリッド -->
      <div class="mb-4">
        <label class="text-xs text-gray-400 font-semibold block mb-1">パレット選択</label>
        <div id="modalPaletteGrid" class="grid grid-cols-6 gap-1.5 p-2 bg-gray-50 rounded border"></div>
      </div>

      <div class="mb-5">
        <label class="text-xs text-gray-400 font-semibold block mb-1">カラーコード指定</label>
        <input type="text" id="modalColorText" class="border rounded px-3 py-2 w-full text-sm font-mono focus:ring-1 focus:ring-indigo-500" placeholder="#888888" />
      </div>

      <div class="flex justify-end space-x-2">
        <button id="modalCancelBtn" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded transition">キャンセル</button>
        <button id="modalConfirmBtn" class="px-4 py-2 text-sm bg-indigo-600 text-white hover:bg-indigo-500 rounded font-semibold transition">変更を適用</button>
      </div>
    </div>
  </div>

  <script>
    // 安全な定義済みカラー（24色）
    const presetColors = [
      '#000000', '#4b5563', '#888888', '#d1d5db', '#ffffff',
      '#ef4444', '#f87171', '#fca5a5', '#f97316', '#fb923c',
      '#eab308', '#facc15', '#22c55e', '#4ade80', '#10b981',
      '#06b6d4', '#2563eb', '#3b82f6', '#60a5fa', '#6366f1',
      '#818cf8', '#a855f7', '#c084fc', '#ec4899'
    ];

    let logs = []; 
    let activeTabs = new Set(['main', 'sub', 'other', 'info', 'system']); 
    let currentEditIndex = null;

    // DOM要素取得
    const fileInput = document.getElementById('fileInput');
    const exportBtn = document.getElementById('exportBtn');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const sidebar = document.getElementById('sidebar');
    const editorContainer = document.getElementById('editorContainer');
    const logList = document.getElementById('logList');
    const tabFilters = document.getElementById('tabFilters');
    const charList = document.getElementById('charList');

    // 新規追加エリア用
    const addTextColor = document.getElementById('addTextColor');
    const addPaletteGrid = document.getElementById('addPaletteGrid');

    // モーダル用
    const colorModal = document.getElementById('colorModal');
    const modalTargetChar = document.getElementById('modalTargetChar');
    const modalPaletteGrid = document.getElementById('modalPaletteGrid');
    const modalColorText = document.getElementById('modalColorText');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    let activeColorTargetName = '';

    // RGB形式のカラー文字列をHEX(#RRGGBB)形式に変換するヘルパー関数
    function rgbToHex(colorStr) {
      if (!colorStr) return '#888888';
      const trimmed = colorStr.trim();
      if (trimmed.startsWith('#')) return trimmed;
      
      const match = trimmed.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*[\d.]+)?\)$/i);
      if (match) {
        const r = parseInt(match[1], 10).toString(16).padStart(2, '0');
        const g = parseInt(match[2], 10).toString(16).padStart(2, '0');
        const b = parseInt(match[3], 10).toString(16).padStart(2, '0');
        return `#${r}${g}${b}`.toLowerCase();
      }
      return trimmed;
    }

    // カラーグリッドを初期化生成する関数
    function initPaletteGrids() {
      // 1. 新規追加フォーム用のグリッド
      addPaletteGrid.innerHTML = '';
      presetColors.forEach(color => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-swatch';
        btn.style.backgroundColor = color;
        btn.title = color;
        btn.addEventListener('click', () => {
          addTextColor.value = color;
        });
        addPaletteGrid.appendChild(btn);
      });

      // 2. モーダル用のグリッド
      modalPaletteGrid.innerHTML = '';
      presetColors.forEach(color => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'color-swatch w-full h-7 rounded border border-black/10';
        btn.style.backgroundColor = color;
        btn.title = color;
        btn.addEventListener('click', () => {
          modalColorText.value = color;
        });
        modalPaletteGrid.appendChild(btn);
      });
    }

    // 起動時にパレットを初期化
    initPaletteGrids();

    // D&D並び替え設定
    const sortable = new Sortable(logList, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: function () {
        const newLogs = [];
        logList.querySelectorAll('[data-index]').forEach((el) => {
          const index = parseInt(el.dataset.index, 10);
          newLogs.push(logs[index]);
        });
        logs = newLogs;
        renderLogs(); 
      }
    });

    fileInput.addEventListener('change', handleFileSelect);

    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => {
      e.preventDefault();
      if (e.dataTransfer.files.length > 0) {
        const file = e.dataTransfer.files[0];
        if (file.name.endsWith('.html')) {
          const reader = new FileReader();
          reader.onload = function(evt) {
            parseAndLoadHTML(evt.target.result);
          };
          reader.readAsText(file);
        }
      }
    });

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        parseAndLoadHTML(evt.target.result);
      };
      reader.readAsText(file);
    }

    // HTMLのパース処理
    function parseAndLoadHTML(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const paragraphs = doc.querySelectorAll('body > p');
      
      logs = [];
      activeTabs = new Set(['main', 'sub', 'other', 'info', 'system']);

      paragraphs.forEach(p => {
        // style.colorから取得した値を rgbToHex で確実に HEX形式に変換する
        const rawColor = p.style.color || '#888888';
        const color = rgbToHex(rawColor);
        
        const spans = p.querySelectorAll('span');
        if (spans.length >= 3) {
          const tabRaw = spans[0].textContent;
          const tab = tabRaw.replace('[', '').replace(']', '').trim();
          const name = spans[1].textContent.trim();
          const content = spans[2].innerHTML.replace(/^\s+|\s+$/g, '');
          
          logs.push({
            color: color,
            tab: tab,
            name: name,
            content: content
          });
        }
      });

      if (logs.length > 0) {
        welcomeScreen.classList.add('hidden');
        sidebar.classList.remove('hidden');
        editorContainer.classList.remove('hidden');
        exportBtn.classList.remove('hidden');
        renderTabFilters();
        renderLogs();
      } else {
        alert('有効なココフォリアのHTMLログファイルが見つかりませんでした。');
      }
    }

    // タブフィルターの表示
    function renderTabFilters() {
      const tabSet = new Set();
      logs.forEach(log => tabSet.add(log.tab));
      
      tabFilters.innerHTML = '';
      tabSet.forEach(tab => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between text-sm bg-gray-50 p-2 rounded';
        
        const label = document.createElement('label');
        label.className = 'flex items-center space-x-2 cursor-pointer w-full';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = activeTabs.has(tab);
        checkbox.className = 'rounded text-indigo-600 focus:ring-indigo-500';
        checkbox.addEventListener('change', () => {
          if (checkbox.checked) {
            activeTabs.add(tab);
          } else {
            activeTabs.delete(tab);
          }
          renderLogs();
        });
        
        const span = document.createElement('span');
        span.textContent = `[${tab}]`;
        span.className = 'font-mono text-xs font-semibold';
        
        label.appendChild(checkbox);
        label.appendChild(span);
        div.appendChild(label);
        tabFilters.appendChild(div);
      });
    }

    // キャラクターリストの表示
    function renderCharList() {
      const charsMap = new Map();
      logs.forEach(log => {
        if (!activeTabs.has(log.tab)) return;
        if (!charsMap.has(log.name)) {
          charsMap.set(log.name, log.color);
        }
      });

      charList.innerHTML = '';
      if (charsMap.size === 0) {
        charList.innerHTML = '<p class="text-xs text-gray-400">表示中のキャラクターはいません</p>';
        return;
      }

      charsMap.forEach((color, name) => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between bg-gray-50 p-2 rounded text-xs space-x-1';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.value = name;
        nameInput.className = 'border border-gray-300 rounded px-1.5 py-0.5 w-28 text-xs focus:ring-1 focus:ring-indigo-500';
        nameInput.addEventListener('change', () => {
          const newName = nameInput.value.trim();
          if (newName && newName !== name) {
            logs.forEach(log => {
              // 1. 各発言の送信者名を更新
              if (log.name === name) {
                log.name = newName;
              }
              
              // 2. 本文（システムログ等）の中に含まれる名前も完全一致で全置換
              if (log.content.includes(name)) {
                log.content = log.content.split(name).join(newName);
              }
            });
            renderLogs();
          }
        });

        const actions = document.createElement('div');
        actions.className = 'flex items-center space-x-1';

        const colorIndicator = document.createElement('button');
        colorIndicator.className = 'w-5 h-5 rounded border border-black/20 shadow-sm transition transform hover:scale-110';
        colorIndicator.style.backgroundColor = color;
        colorIndicator.title = "カラーを一括変更";
        colorIndicator.addEventListener('click', () => {
          openColorModal(name, color);
        });

        actions.appendChild(colorIndicator);
        div.appendChild(nameInput);
        div.appendChild(actions);
        charList.appendChild(div);
      });
    }

    // モーダルの表示処理
    function openColorModal(name, currentColor) {
      activeColorTargetName = name;
      modalTargetChar.textContent = name;
      modalColorText.value = rgbToHex(currentColor); // 確実にHEXに変換して設定
      colorModal.classList.remove('hidden');
    }

    modalCancelBtn.addEventListener('click', () => {
      colorModal.classList.add('hidden');
    });

    modalConfirmBtn.addEventListener('click', () => {
      let targetColor = modalColorText.value.trim();
      
      if (!targetColor.startsWith('#')) {
        targetColor = '#' + targetColor;
      }
      if (/^#[0-9A-F]{6}$/i.test(targetColor) || /^#[0-9A-F]{3}$/i.test(targetColor)) {
        logs.forEach(log => {
          if (log.name === activeColorTargetName) {
            log.color = targetColor.toLowerCase();
          }
        });
        colorModal.classList.add('hidden');
        renderLogs();
      } else {
        alert('正しいカラーコード（例: #888888）を入力してください。');
      }
    });

    // ログリスト描画
    function renderLogs() {
      logList.innerHTML = '';

      logs.forEach((log, index) => {
        if (!activeTabs.has(log.tab)) return;

        const p = document.createElement('div');
        p.className = 'flex items-start bg-white border border-gray-200 rounded p-2.5 shadow-sm space-x-2 relative group hover:border-indigo-300 transition duration-150';
        p.dataset.index = index;

        const handle = document.createElement('div');
        handle.className = 'drag-handle text-gray-400 p-1 hover:text-gray-600 transition';
        handle.innerHTML = `
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16"></path>
          </svg>
        `;

        const tabBadge = document.createElement('span');
        tabBadge.className = 'font-mono text-xs font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-600 border shrink-0 mt-0.5';
        tabBadge.textContent = `[${log.tab}]`;

        const contentBox = document.createElement('div');
        contentBox.className = 'flex-1 space-y-1';

        const header = document.createElement('div');
        header.className = 'flex items-center space-x-2';
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'font-bold text-sm';
        nameSpan.style.color = log.color;
        nameSpan.textContent = log.name;

        header.appendChild(nameSpan);

        const bodyText = document.createElement('div');
        bodyText.className = 'text-sm text-gray-700 whitespace-pre-wrap leading-relaxed break-all';
        bodyText.innerHTML = log.content;

        contentBox.appendChild(header);
        contentBox.appendChild(bodyText);

        const controlPanel = document.createElement('div');
        controlPanel.className = 'flex items-center space-x-1 shrink-0 self-center opacity-0 group-hover:opacity-100 transition duration-150';

        const editBtn = document.createElement('button');
        editBtn.className = 'p-1 hover:bg-gray-100 rounded text-indigo-600 transition';
        editBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
          </svg>
        `;
        editBtn.addEventListener('click', () => {
          enterEditMode(p, index, log, bodyText);
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'p-1 hover:bg-red-50 rounded text-red-500 transition';
        deleteBtn.innerHTML = `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        `;
        deleteBtn.addEventListener('click', () => {
          if (confirm('この発言を削除しますか？')) {
            logs.splice(index, 1);
            renderLogs();
          }
        });

        controlPanel.appendChild(editBtn);
        controlPanel.appendChild(deleteBtn);

        p.appendChild(handle);
        p.appendChild(tabBadge);
        p.appendChild(contentBox);
        p.appendChild(controlPanel);

        logList.appendChild(p);
      });

      renderCharList();
    }

    // 編集モード
    function enterEditMode(pElement, index, log, bodyTextElement) {
      if (currentEditIndex !== null) return; 
      currentEditIndex = index;

      const editContainer = document.createElement('div');
      editContainer.className = 'space-y-2 mt-1';

      const textarea = document.createElement('textarea');
      textarea.className = 'w-full border rounded px-2 py-1.5 text-sm focus:ring-1 focus:ring-indigo-500';
      textarea.rows = 3;
      textarea.value = log.content.replace(/<br\s*\/?>/gi, '\n');

      const actionDiv = document.createElement('div');
      actionDiv.className = 'flex space-x-2 justify-end';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-600 transition';
      cancelBtn.textContent = 'キャンセル';
      cancelBtn.addEventListener('click', () => {
        currentEditIndex = null;
        renderLogs();
      });

      const saveBtn = document.createElement('button');
      saveBtn.className = 'px-3 py-1 text-xs bg-indigo-600 hover:bg-indigo-500 text-white rounded font-semibold transition';
      saveBtn.textContent = '保存';
      saveBtn.addEventListener('click', () => {
        log.content = textarea.value.replace(/\n/g, '<br>');
        currentEditIndex = null;
        renderLogs();
      });

      actionDiv.appendChild(cancelBtn);
      actionDiv.appendChild(saveBtn);
      editContainer.appendChild(textarea);
      editContainer.appendChild(actionDiv);

      bodyTextElement.innerHTML = '';
      bodyTextElement.appendChild(editContainer);
    }

    // 発言追加処理
    document.getElementById('addLogBtn').addEventListener('click', () => {
      const name = document.getElementById('addName').value.trim();
      const tab = document.getElementById('addTab').value;
      let color = addTextColor.value.trim();
      const contentRaw = document.getElementById('addContent').value;

      if (!name) {
        alert('発言者名を入力してください。');
        return;
      }
      if (!contentRaw) {
        alert('発言内容を入力してください。');
        return;
      }

      if (!color.startsWith('#')) {
        color = '#' + color;
      }
      if (!/^#[0-9A-F]{6}$/i.test(color) && !/^#[0-9A-F]{3}$/i.test(color)) {
        color = '#888888'; 
      }

      const content = contentRaw.replace(/\n/g, '<br>');

      logs.push({
        color: color.toLowerCase(),
        tab: tab,
        name: name,
        content: content
      });

      document.getElementById('addContent').value = '';
      renderLogs();
      editorContainer.scrollTop = editorContainer.scrollHeight;
    });

    // 文末の「/」一括削除処理
    document.getElementById('removeSlashBtn').addEventListener('click', () => {
      if (logs.length === 0) {
        alert('ログデータが読み込まれていません。');
        return;
      }

      if (confirm('すべての発言の末尾にある「/」または「／」を一括で削除します。よろしいですか？\n※文末の改行や空白スペースはそのまま維持されます。')) {
        let count = 0;
        logs.forEach(log => {
          const original = log.content;
          
          // 末尾のスラッシュ（半角・全角）を対象に、それより後にある空白文字や改行タグ（<br>など）をキャプチャして保持したまま削除
          log.content = log.content.replace(/[/／](\s*(?:<br\s*\/?>\s*)*)$/i, '$1');
          
          if (original !== log.content) {
            count++;
          }
        });
        
        renderLogs();
        alert(`${count}件の発言から末尾の「/」を削除しました。`);
      }
    });

    // ログ出力
    exportBtn.addEventListener('click', () => {
      let bodyContent = '';
      
      logs.forEach(log => {
        if (!activeTabs.has(log.tab)) return;

        bodyContent += `<p style="color:${log.color};">\n`;
        bodyContent += `  <span> [${log.tab}]</span>\n`;
        bodyContent += `  <span>${escapeHTML(log.name)}</span> :\n`;
        bodyContent += `  <span>\n    ${log.content.trim()} \n  </span>\n`;
        bodyContent += `</p>\n\n`;
      });

      const finalHTML = `<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ccfolia - logs</title>
  </head>
  <body>
    ${bodyContent.trim()}
  </body>
</html>`;

      const blob = new Blob([finalHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'edited_ccfolia_log.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    function escapeHTML(string) {
      return string.replace(/[&<>"']/g, function(match) {
        const escape = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        };
        return escape[match];
      });
    }
  </script>
</body>
</html>
